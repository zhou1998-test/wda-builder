name: Build Sign WDA

on:
  workflow_dispatch:
    inputs:
      apple_id:
        required: true
      apple_password:
        required: true

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          repository: appium/WebDriverAgent
          ref: v15.0.0

      - name: Build and Sign
        env:
          APPLE_ID: ${{ github.event.inputs.apple_id }}
          APPLE_PASSWORD: ${{ github.event.inputs.apple_password }}
        run: |
          BUNDLE_ID="com.zhou1998.wda.runner"
          
          # Add Apple ID to keychain
          security add-generic-password -a "$APPLE_ID" -s "Xcode-Altool" -w "$APPLE_PASSWORD" -T /usr/bin/security
          
          # Create export plist for adhoc signing
          cat > export.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>teamID</key>
              <string></string>
          </dict>
          </plist>
          EOF
          
          # Build
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_STYLE=Automatic \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM="" 2>&1 | tail -30

          # Package
          mkdir -p Payload
          find build -name "WebDriverAgentRunner.app" -type d | head -1 | xargs -I{} cp -r {} Payload/
          if [ -d Payload/WebDriverAgentRunner.app ]; then
            zip -rj WDA.ipa Payload
            echo "SUCCESS"
            ls -la WDA.ipa
          else
            echo "No app found, checking build output:"
            find build -name "*.app" -type d
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: WDA-signed
          path: WDA.ipa