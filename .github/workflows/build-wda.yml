name: Build WDA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          repository: appium/WebDriverAgent
          path: wda

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build WDA
        run: |
          cd wda
          ls Scripts/ || ls scripts/ || ls *.sh || echo "No bootstrap found"
          find . -name "bootstrap*" -type f 2>/dev/null || echo "searching..."
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO
          mkdir Payload
          cp -r build/Build/Products/Release-iphoneos/WebDriverAgentRunner.app Payload/
          zip -rj WDA_unsigned.zip Payload

      - uses: actions/upload-artifact@v4
        with:
          name: WDA-unsigned
          path: wda/WDA_unsigned.zip