name: Build and Sign WDA

on:
  workflow_dispatch:
    inputs:
      apple_id:
        required: true
      apple_password:
        required: true

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          repository: appium/WebDriverAgent
          ref: v15.0.0

      - name: Build WDA
        env:
          APPLE_ID: ${{ github.event.inputs.apple_id }}
          APPLE_PASSWORD: ${{ github.event.inputs.apple_password }}
        run: |
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_STYLE=Automatic \
            PRODUCT_BUNDLE_IDENTIFIER="com.zhou1998.wda" \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM=""

          echo "=== Build output ==="
          find build -name "*.app" -type d
          find build -name "WebDriverAgent*" -type d | head -10

          mkdir -p Payload
          APP=$(find build -name "*.app" -type d | head -1)
          if [ -n "$APP" ]; then
            cp -r "$APP" Payload/
            zip -rj WDA_signed.ipa Payload
            echo "IPA created:"
            ls -la WDA_signed.ipa
          else
            echo "No .app found!"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: WDA-signed
          path: WDA_signed.ipa