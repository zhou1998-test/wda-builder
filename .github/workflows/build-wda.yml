name: Build Unsigned WDA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          repository: appium/WebDriverAgent
          ref: v15.0.0

      - name: Build WDA
        run: |
          xcodebuild \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

          echo "=== Products ==="
          find build/Build/Products -type d -maxdepth 3 2>/dev/null
          echo "=== All .app ==="
          find build -name "*.app" -type d 2>/dev/null
          echo "=== Runner files ==="
          find build -name "*Runner*" -type f 2>/dev/null | head -10

          APP=$(find build -name "*.app" -type d 2>/dev/null | head -1)
          if [ -n "$APP" ]; then
            echo "APP: $APP"
            mkdir -p Payload && cp -r "$APP" Payload/ && zip -rj WDA_unsigned.zip Payload && ls -la WDA_unsigned.zip
          else
            echo "No .app, trying alternative..."
            # Try to create IPA manually from built products
            mkdir -p Payload/WDA.app
            cp -r build/Build/Products/Release-iphoneos/* Payload/WDA.app/ 2>/dev/null
            ls Payload/WDA.app/ | head -5
            if [ "$(ls -A Payload/WDA.app)" ]; then
              zip -rj WDA_unsigned.zip Payload && ls -la WDA_unsigned.zip
            else
              echo "FAIL"
              exit 1
            fi
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: WDA-unsigned
          path: WDA_unsigned.zip