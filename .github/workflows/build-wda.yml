name: Build Unsigned WDA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          repository: appium/WebDriverAgent
          ref: v15.0.0

      - name: Build WDA (no signing)
        run: |
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

          echo "=== Looking for .app ==="
          find build -name "*.app" -type d
          APP=$(find build -name "*.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "Searching differently..."
            find build -name "WebDriverAgent*" | head -20
            exit 1
          fi
          echo "Found: $APP"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -rj WDA_unsigned.zip Payload
          ls -la WDA_unsigned.zip
          echo "SUCCESS"

      - uses: actions/upload-artifact@v4
        with:
          name: WDA-unsigned
          path: WDA_unsigned.zip