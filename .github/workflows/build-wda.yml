name: Build and Sign WDA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          repository: appium/WebDriverAgent
          ref: v15.0.0

      - name: List structure
        run: |
          ls -la
          ls Scripts/ 2>/dev/null || echo "no Scripts dir"
          find . -name "*.sh" -o -name "Podfile" -o -name "*.xcodeproj" -o -name "*.xcworkspace" | head -10

      - name: Build with xcodebuild
        run: |
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
          mkdir -p Payload
          find build -name "WebDriverAgentRunner.app" | head -1 | xargs -I{} cp -r {} Payload/
          zip -rj WDA_unsigned.zip Payload
          echo "BUILD DONE"
          ls -la WDA_unsigned.zip

      - uses: actions/upload-artifact@v4
        with:
          name: WDA
          path: WDA_unsigned.zip