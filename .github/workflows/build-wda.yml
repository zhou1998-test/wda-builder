name: Build WDA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          repository: appium/WebDriverAgent
          path: wda

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build WDA
        run: |
          cd wda
          # Try to find and fix build dependencies
          gem install cocoapods 2>/dev/null || true
          find . -name "Podfile" -execdir pod install \; 2>/dev/null || true

          xcodebuild build-for-testing \
            -workspace WebDriverAgent.xcworkspace \
            -scheme WebDriverAgentRunner \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO 2>&1 || \
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

          mkdir -p Payload
          find build -name "WebDriverAgentRunner.app" -type d | while read app; do
            cp -r "$app" Payload/
          done
          if [ -d Payload/WebDriverAgentRunner.app ]; then
            zip -rj WDA_unsigned.zip Payload
            echo "BUILD SUCCESS"
          else
            echo "BUILD FAILED - listing build output:"
            find build -name "*.app" -type d 2>/dev/null
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: WDA-unsigned
          path: wda/WDA_unsigned.zip