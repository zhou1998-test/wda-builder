name: Build and Sign WDA

on:
  workflow_dispatch:
    inputs:
      apple_id:
        description: Apple ID email
        required: true
      apple_password:
        description: Apple ID app-specific password
        required: true

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          repository: appium/WebDriverAgent
          ref: v15.0.0

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build and Sign WDA
        env:
          APPLE_ID: ${{ github.event.inputs.apple_id }}
          APPLE_PASSWORD: ${{ github.event.inputs.apple_password }}
        run: |
          # Create unique bundle ID
          BUNDLE_ID="com.zhou1998.wda.$(date +%s)"
          TEAM_ID=""

          # Build with automatic signing
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            -allowProvisioningUpdates \
            -authenticationKeyIssuerID="" \
            -authenticationKeyID="" \
            -authenticationKeyPath="" \
            2>&1 || true

          # Try alternative: build unsigned first
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

          mkdir -p Payload
          find build -name "WebDriverAgentRunner.app" -type d | head -1 | xargs -I{} cp -r {} Payload/
          zip -rj WDA_unsigned.zip Payload
          echo "DONE"
          ls -la WDA_unsigned.zip

      - uses: actions/upload-artifact@v4
        with:
          name: WDA
          path: WDA_unsigned.zip